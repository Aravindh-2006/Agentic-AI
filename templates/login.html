{% extends "base.html" %}

{% block title %}Login - AI Startup Validator{% endblock %}

{% block content %}
<div class="form-card">
    <h2 class="form-title">Welcome Back</h2>
    <p class="form-subtitle">Log in to validate your startup concepts with AI</p>
    
    <form action="{{ url_for('auth.login') }}" method="POST">
        <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
        </div>
        
        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
        </div>
        
        <button type="submit" class="btn-submit">
            <i class="fa-solid fa-right-to-bracket"></i> Sign In
        </button>
    </form>
    
    {% if google_configured %}
        <div class="divider">or</div>
        <a href="{{ url_for('auth.google_login') }}" class="google-btn">
            <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
            </svg>
            <span>Continue with Google</span>
        </a>
    {% endif %}
    
    <p class="form-footer-link">
        Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up here</a>
    </p>
</div>
{% endblock %}
